---
# 独立的 session redis (2026-07-09)
# 不复用外部 sentinel 集群 (处于 failover 状态, master 不可达),
# 单实例 + emptyDir. 内容只是登录 session, 掉了也就重登, 不需要持久化.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-redis
  namespace: new-ecommerce
  labels:
    app: session-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-redis
  template:
    metadata:
      labels:
        app: session-redis
    spec:
      nodeSelector:
        kubernetes.io/hostname: huangfra-ubun-master-ms-7e11
      containers:
      - name: redis
        image: redis:7-alpine
        args: ["redis-server", "--appendonly", "no", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
        readinessProbe:
          tcpSocket: { port: 6379 }
          initialDelaySeconds: 3
        livenessProbe:
          tcpSocket: { port: 6379 }
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: session-redis
  namespace: new-ecommerce
spec:
  type: NodePort
  selector:
    app: session-redis
  ports:
  - port: 6379
    targetPort: 6379
    nodePort: 31379
