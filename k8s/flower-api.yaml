---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-api
  namespace: new-ecommerce
  labels:
    app: flower-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower-api
  template:
    metadata:
      labels:
        app: flower-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: huangfra-ubun-master-ms-7e11
      containers:
      - name: flower-api
        image: 100.76.15.64:5001/flower-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3010
        env:
        - name: NODE_ENV
          value: production
        # === Zitadel OIDC (2026-07-05) ===
        - name: ZITADEL_ISSUER
          value: "https://id.horiculture.club"
        - name: ZITADEL_CLUB_WEB_CLIENT_ID
          value: "380222397556523217"
        - name: ZITADEL_SPACE_WEB_CLIENT_ID
          value: "380222566284984529"
        # === Redis session (2026-07-09) ===
        - name: REDIS_URL
          value: "redis://session-redis.new-ecommerce.svc.cluster.local:6379"
        # Zitadel service PAT (v2/sessions password-login)
        - name: ZITADEL_PAT
          valueFrom:
            secretKeyRef:
              name: zitadel-svc
              key: pat
        envFrom:
        - secretRef:
            name: flower-next-zitadel
        - secretRef:
            name: flower-api-la-payment
---
apiVersion: v1
kind: Service
metadata:
  name: flower-api
  namespace: new-ecommerce
spec:
  type: NodePort
  selector:
    app: flower-api
  ports:
  - port: 3010
    targetPort: 3010
    nodePort: 31010

