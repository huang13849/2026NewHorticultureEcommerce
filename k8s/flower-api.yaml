---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-api
  namespace: new-ecommerce
  labels:
    app: flower-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower-api
  template:
    metadata:
      labels:
        app: flower-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: ubuntu-master
      containers:
      - name: flower-api
        image: 100.76.15.64:5001/flower-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3010
        env:
        - name: NODE_ENV
          value: production
---
apiVersion: v1
kind: Service
metadata:
  name: flower-api
  namespace: new-ecommerce
spec:
  type: NodePort
  selector:
    app: flower-api
  ports:
  - port: 3010
    targetPort: 3010
    nodePort: 31010

