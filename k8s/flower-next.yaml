---
apiVersion: v1
kind: Secret
metadata:
  name: flower-next-zitadel
  namespace: new-ecommerce
type: Opaque
stringData:
  # NextAuth session secret (32-byte hex). 生产上请轮换。
  NEXTAUTH_SECRET: "***REMOVED_NEXTAUTH_SECRET***"
  AUTH_SECRET: "***REMOVED_NEXTAUTH_SECRET***"
  # club-web (horiculture.club, 中文)
  CLUB_CLIENT_ID: "382022444505956510"
  CLUB_CLIENT_SECRET: ""
  CLUB_ISSUER: "https://id-shopclub.horiculture.club"
  # space-web (horiculture.space, 英文)
  SPACE_CLIENT_ID: "380222566284984529"
  SPACE_CLIENT_SECRET: "***REMOVED_SPACE_CLIENT_SECRET***"
---
# Zitadel Service User PAT (方案 Z: 后端调 v2 Session API)
# 由 jenkins-pat.sh 从 ~/.zitadel-svc-pat 生成后 apply, 不直接写在 repo
# 为避免 CI 侧手动干预, 这里嵌入当前 pat base64 (轮换请 kubectl edit secret zitadel-svc)
apiVersion: v1
kind: Secret
metadata:
  name: zitadel-svc
  namespace: new-ecommerce
type: Opaque
data:
  pat: 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-next
  namespace: new-ecommerce
  labels:
    app: flower-next
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower-next
  template:
    metadata:
      labels:
        app: flower-next
    spec:
      nodeSelector:
        kubernetes.io/hostname: huangfra-ubun-master-ms-7e11
      containers:
      - name: flower-next
        image: 100.76.15.64:5001/flower-next:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: PEONY_MOBILE_AUTH_URL
          value: "http://mobile-auth-service.peony.svc.cluster.local:3020"
        - name: PEONY_SUPPLIER_URL
          value: "http://supplier-service.supply-chain.svc.cluster.local:3002"
        - name: ZITADEL_LOGIN_V2_URL
          value: "http://100.96.54.109:31112"
        # === club-web OIDC (2026-07-05) ===
        - name: ZITADEL_ISSUER
          value: "https://id.horiculture.club"
        - name: ZITADEL_CLUB_WEB_CLIENT_ID
          value: "382022444505956510"
        - name: ZITADEL_CLUB_WEB_REDIRECT_URI
          value: "https://horiculture.club/api/auth/callback/zitadel"
        - name: FLOWER_API_URL
          value: "http://flower-api.new-ecommerce.svc.cluster.local:3010"
        # 方案 Z: Zitadel v2 Session API (后端 side)
        - name: ZITADEL_BASE_URL
          value: "http://id.horiculture.club:8080"
        - name: ZITADEL_EXTERNAL_HOST
          value: "id.horiculture.club"
        - name: ZITADEL_ORG_ID
          value: "380209872962126024"
        - name: ZITADEL_LOGIN_DOMAIN
          value: "horiculture.local"
        - name: ZITADEL_SVC_PAT
          valueFrom:
            secretKeyRef:
              name: zitadel-svc
              key: pat
        - name: NEXTAUTH_URL
          value: "https://horiculture.club"
        - name: API_GATEWAY_URL
          value: "http://api-gateway-origin.new-ecommerce.svc.cluster.local:3007"
        envFrom:
        - secretRef:
            name: flower-next-zitadel
---
apiVersion: v1
kind: Service
metadata:
  name: flower-next
  namespace: new-ecommerce
spec:
  type: NodePort
  selector:
    app: flower-next
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31000
