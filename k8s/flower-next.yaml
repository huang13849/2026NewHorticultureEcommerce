---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-next
  namespace: new-ecommerce
  labels:
    app: flower-next
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower-next
  template:
    metadata:
      labels:
        app: flower-next
    spec:
      nodeSelector:
        kubernetes.io/hostname: huangfra-ubun-master-ms-7e11
      containers:
      - name: flower-next
        image: 100.76.15.64:5001/flower-next:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
---
apiVersion: v1
kind: Service
metadata:
  name: flower-next
  namespace: new-ecommerce
spec:
  type: NodePort
  selector:
    app: flower-next
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31000

