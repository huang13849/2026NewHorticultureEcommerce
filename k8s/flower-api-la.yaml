---
# LA-node-hosted flower-api replica for horiculture.space
# Runs on k8s.node1 (LA, zone=us).
# Since Flannel-over-tailscale doesn't route to master's CoreDNS/ClusterIP,
# the LA pod reaches api-gateway via NodePort over tailscale (100.96.54.109:31007).
# The pod also rewrites any MinIO URL that leaks through to be same-origin (space).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-api-la
  namespace: new-ecommerce
  labels:
    app: flower-api-la
    zone: us
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower-api-la
  template:
    metadata:
      labels:
        app: flower-api-la
        zone: us
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s.node1
      dnsPolicy: Default   # skip CoreDNS (unreachable from LA over tailscale)
      containers:
      - name: flower-api
        image: 100.76.15.64:5001/flower-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3010
        env:
        - name: NODE_ENV
          value: production
        - name: API_GATEWAY_URL
          # LA pod → tailscale → master's NodePort → api-gateway pod
          value: http://100.96.54.109:31007
        - name: PORT
          value: "3010"
        # === Redis session (2026-07-09) ===
        - name: REDIS_URL
          value: "redis://100.96.54.109:31379"
        - name: ZITADEL_PAT
          valueFrom:
            secretKeyRef:
              name: zitadel-svc
              key: pat
        - name: PG_HOST
          value: "100.67.126.90"
        - name: PG_PORT
          value: "5432"
        - name: PG_DATABASE
          value: "supply_chain"
        - name: PG_USER
          value: "postgres"
        - name: PG_READ_HOSTS
          value: "100.127.141.83:5433,100.76.15.64:5432"
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pg-orders
              key: PG_PASSWORD
        envFrom:
        - secretRef:
            name: flower-next-zitadel
        - secretRef:
            name: flower-api-la-payment
        readinessProbe:
          tcpSocket: { port: 3010 }
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket: { port: 3010 }
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: flower-api-la
  namespace: new-ecommerce
spec:
  type: NodePort
  selector:
    app: flower-api-la
  ports:
  - port: 3010
    targetPort: 3010
    nodePort: 31030
