services:
  # ===== 后端 API（通过 API Gateway 访问数据库） =====
  flower-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flower-api
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - JWT_SECRET=flower-shop-jwt-secret-2024-prod
      - API_GATEWAY_URL=http://100.96.54.109:3007
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===== Next.js 前端 =====
  flower-next:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    container_name: flower-next
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - flower-api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===== 供应商地图 =====
  supplier-map:
    build:
      context: ./supplier-map
      dockerfile: Dockerfile
    container_name: supplier-map
    restart: unless-stopped
    ports:
      - "29007:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===== SEO / 访问统计微服务 =====
  seo-service:
    build:
      context: ./seo-service
      dockerfile: Dockerfile
    container_name: seo-service
    restart: unless-stopped
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=production
      - PORT=3011
      - SITE_URL=https://2026newhorticultureecommerce.pages.dev
      - DATA_DIR=/app/data
    volumes:
      - ./seo-service/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

