    # stub_status：仅供 nginx-exporter 抓取(本地 8088)
    
    # ============================================================
    # id.horiculture.club :80 → reverse proxy to k3s Zitadel :31111
    # (待 certbot 签好证书后追加 :443 vhost, 现在 http 就够 Zitadel V2 拿 challenge)
    # ============================================================
    server {
        listen 80;
        server_name id.horiculture.club;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name id.horiculture.club;

        access_log /var/log/nginx/id-club-access.log;
        error_log  /var/log/nginx/id-club-error.log;

        ssl_certificate     /etc/letsencrypt/live/id.horiculture.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/id.horiculture.club/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL_ID:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 20m;

        # 反代到 k3s Zitadel; 关键: X-Forwarded-Proto https 让 Zitadel emit https URLs
        location / {
            add_header X-Origin-Nginx "suzhou-zitadel-tls" always;
            proxy_pass http://k3s_zitadel;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            grpc_read_timeout 300s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    server {
        listen 127.0.0.1:8088;
        server_name localhost;
        location /nginx_status {
            stub_status;
            access_log off;
        }
    }
