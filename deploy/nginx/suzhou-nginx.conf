worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'cfip="$http_cf_connecting_ip" xff="$http_x_forwarded_for" rt=$request_time';
    sendfile on;
    client_max_body_size 50m;
    access_log /var/log/nginx/access.log main_ext;
    error_log /var/log/nginx/error.log;

    # === k3s upstreams (via Tailscale 100.96.54.109) ===
    # 苏州机不再跑 flower-next/flower-api/seo，全部反代到 k3s master 的 NodePort
    upstream k3s_flower_next  { server 100.96.54.109:31000; keepalive 32; }
    upstream k3s_zitadel      { server 100.96.54.109:31111; keepalive 32; }
    upstream k3s_flower_api   { server 100.96.54.109:31010; keepalive 32; }
    upstream k3s_seo_service  { server 100.96.54.109:31011; keepalive 32; }
    upstream k3s_supplier_map { server 100.96.54.109:31307; keepalive 16; }
    upstream k3s_dealer_map   { server 100.96.54.109:31308; keepalive 16; }
    upstream k3s_peony_web    { server 100.96.54.109:31023; keepalive 16; }
    upstream k3s_school_web   { server 100.96.54.109:31032; keepalive 16; }
    upstream k3s_school_svc   { server 100.96.54.109:31031; keepalive 16; }
    upstream k3s_tropical_web { server 100.96.54.109:31024; keepalive 16; }
    # tag response

    # 站点：前端 + /api 反代 + /minio 反代到本地对象存储
    # horiculture.club :80 → :443 redirect (保留 acme-challenge)
    server {
        listen 80;
        server_name horiculture.club;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name _;
        # ACME HTTP-01 challenge (Let's Encrypt)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }


        # 国内对象存储入口：/minio/supply-chain/... -> 本地 MinIO /supply-chain/...
        # 保留本机 MinIO 图床
        location /minio/ {
            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # SEO 服务：/seo-api/* -> k3s seo-service:31011
        location /seo-api/ {
            rewrite ^/seo-api/(.*)$ /$1 break;
            proxy_pass http://k3s_seo_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # MongoDB API Gateway：直接反代到 100.96.54.109:3007 (原样保留)
        location /api/mongo/ {
            add_header X-Origin-Nginx "suzhou" always;
            proxy_pass http://100.96.54.109:31007/api/mongo/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header x-api-key ***REMOVED_API_KEY***;
            proxy_read_timeout 60s;
            proxy_set_header Accept-Encoding "";
            sub_filter_types application/json text/html;
            sub_filter_once off;
            # 把老数据里的内网 MinIO 完整前缀改成公网可回源的相对路径。
            # 数据库里同时存在两类值:
            #   1) 完整 URL "http://100.96.54.109:9000/supply-chain/products/xxx.jpg"
            #   2) 裸 key  "products/xxx.jpg"
            # 前端逻辑 startsWith("http") ? 直接用 : /minio/supply-chain/${t}
            # 因此把老数据的完整前缀替换为 /minio/supply-chain/,让前端跳过再拼前缀 (裸的 startsWith(http) false 走拼装分支时,值已经是 /minio/... 但因为不 startsWith http 前端还会再拼一次 → 双前缀 BUG,所以整段带 http 保留成一个绝对 URL 让前端不再改)
            sub_filter "http://100.96.54.109:9000/supply-chain/" "/minio/supply-chain/";
            sub_filter "http://100.76.15.64:9000/supply-chain/"  "/minio/supply-chain/";
            sub_filter "https://horiculture.club/minio/supply-chain/" "/minio/supply-chain/";
            sub_filter "https://horiculture.space/minio/supply-chain/" "/minio/supply-chain/";

        }

        # Auth.js SSO 路由 (/api/auth/*) 必须走 next-app, 不能落到 flower-api
        location /api/auth/ {
            add_header X-Origin-Nginx "suzhou-nextauth" always;
            proxy_pass http://k3s_flower_next;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # 业务 API：/api/* -> k3s flower-api:31010
        location /api/ {
            add_header X-Origin-Nginx "suzhou-flowerapi" always;
            proxy_pass http://k3s_flower_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_set_header Accept-Encoding "";
            sub_filter_types application/json text/html;
            sub_filter_once off;
            # 把老数据里的内网 MinIO 完整前缀改成公网可回源的相对路径。
            # 数据库里同时存在两类值:
            #   1) 完整 URL "http://100.96.54.109:9000/supply-chain/products/xxx.jpg"
            #   2) 裸 key  "products/xxx.jpg"
            # 前端逻辑 startsWith("http") ? 直接用 : /minio/supply-chain/${t}
            # 因此把老数据的完整前缀替换为 /minio/supply-chain/,让前端跳过再拼前缀 (裸的 startsWith(http) false 走拼装分支时,值已经是 /minio/... 但因为不 startsWith http 前端还会再拼一次 → 双前缀 BUG,所以整段带 http 保留成一个绝对 URL 让前端不再改)
            sub_filter "http://100.96.54.109:9000/supply-chain/" "/minio/supply-chain/";
            sub_filter "http://100.76.15.64:9000/supply-chain/"  "/minio/supply-chain/";
            sub_filter "https://horiculture.club/minio/supply-chain/" "/minio/supply-chain/";
            sub_filter "https://horiculture.space/minio/supply-chain/" "/minio/supply-chain/";

        }

        # 供应商地图：走 k3s supplier-map:31307
        location /supplier-map/ {
            proxy_pass http://k3s_supplier_map/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 经销商地图：走 k3s dealer-map:31308
        location /dealer-map/ {
            proxy_pass http://k3s_dealer_map/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 主前端：/ -> k3s flower-next:31000 (含 /_next/, /map, /cart, /login, /admin ...)
        location / {
            proxy_pass http://k3s_flower_next;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name horiculture.club;

        ssl_certificate /etc/nginx/certs/horiculture.club.crt;
        ssl_certificate_key /etc/nginx/certs/horiculture.club.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_prefer_server_ciphers on;

        # ACME HTTP-01 challenge (Let's Encrypt)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
