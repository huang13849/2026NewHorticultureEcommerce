        }

        # 业务 API：/api/* -> k3s flower-api:31010
        location /api/ {
            add_header X-Origin-Nginx "suzhou-flowerapi" always;
            proxy_pass http://k3s_flower_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_set_header Accept-Encoding "";
            sub_filter_types application/json text/html;
            sub_filter_once off;
            # 把老数据里的内网 MinIO 完整前缀改成公网可回源的相对路径。
            # 数据库里同时存在两类值:
            #   1) 完整 URL "http://100.96.54.109:9000/supply-chain/products/xxx.jpg"
            #   2) 裸 key  "products/xxx.jpg"
            # 前端逻辑 startsWith("http") ? 直接用 : /minio/supply-chain/${t}
            # 因此把老数据的完整前缀替换为 /minio/supply-chain/,让前端跳过再拼前缀 (裸的 startsWith(http) false 走拼装分支时,值已经是 /minio/... 但因为不 startsWith http 前端还会再拼一次 → 双前缀 BUG,所以整段带 http 保留成一个绝对 URL 让前端不再改)
            sub_filter "http://100.96.54.109:9000/supply-chain/" "/minio/supply-chain/";
