        }

        # 主前端：/ -> k3s flower-next:31000 (含 /_next/, /map, /cart, /login, /admin ...)

        # /seo -> k3s seo-service:31011 (SEO 服务 HTML + API)
        location /seo/ {
            rewrite ^/seo/(.*)$ /$1 break;
            proxy_pass http://k3s_seo_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_set_header Accept-Encoding "";
            sub_filter_types application/json text/html application/javascript;
            sub_filter_once off;
            # SEO 服务 HTML 里的绝对根路径改为 /seo/ 前缀
            sub_filter 'href="/api/' 'href="/seo/api/';
            sub_filter "'/api/" "'/seo/api/";
            sub_filter '"/api/' '"/seo/api/';
        }
        location = /seo { return 301 /seo/; }

        # /peony -> k3s peony-web:31023 (芍药联盟)
        location /peony/ {
            rewrite ^/peony/(.*)$ /$1 break;
            proxy_pass http://k3s_peony_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 40m;
            proxy_set_header Accept-Encoding "";
