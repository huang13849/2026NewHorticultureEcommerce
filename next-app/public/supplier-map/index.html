<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Supplier Map · HuaBan</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html,body,#map{width:100%;height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#eef5ee}
    .panel{position:absolute;top:16px;left:16px;z-index:1000;background:rgba(255,255,255,.95);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:14px 16px;min-width:280px;max-width:390px;backdrop-filter:blur(8px)}
    .title{font-size:18px;font-weight:800;color:#255b3b;margin-bottom:6px}.sub{font-size:12px;color:#667;margin-bottom:10px;line-height:1.45}
    .stat{display:flex;gap:8px;flex-wrap:wrap}.pill{font-size:12px;background:#e8f5e9;color:#2e7d32;border-radius:999px;padding:4px 10px}.err{color:#b00020;font-size:12px;margin-top:8px}.loading{color:#666;font-size:12px;margin-top:8px}
    .list{max-height:300px;overflow:auto;margin-top:10px;border-top:1px solid #eee;padding-top:8px}.item{font-size:12px;padding:7px 0;border-bottom:1px dashed #eee;cursor:pointer;line-height:1.4}.item:hover{color:#2e7d32;background:#fafafa}
    .leaflet-popup-content{font-size:13px;line-height:1.55}.shop{font-weight:800;color:#255b3b;font-size:15px}.addr{color:#555}.biz{color:#777;max-width:260px}.toolbar{display:flex;gap:8px;margin-top:10px}.btn{border:1px solid #c8e6c9;background:#fff;color:#2e7d32;border-radius:9px;padding:6px 10px;font-size:12px;cursor:pointer}.btn:hover{background:#e8f5e9}.videoBtn{display:inline-block;margin-top:8px;background:#111827;color:#fff;border-radius:999px;padding:7px 12px;text-decoration:none;font-size:12px;font-weight:700}.videoBtn:hover{background:#064e3b;color:#fff}.miniVideo{display:inline-block;margin-top:4px;color:#047857;font-weight:700;font-size:11px}
    .switchBar{display:flex;gap:0;margin-top:8px;border-radius:8px;overflow:hidden;border:1px solid #c8e6c9}
    .switchBtn{flex:1;padding:6px 10px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
    .switchBtn.active{background:#2e7d32;color:#fff}
    .switchBtn:not(.active){background:#fff;color:#2e7d32}
    .switchBtn:not(.active):hover{background:#f1f8e9}
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <div class="title">🗺️ Supplier Map</div>
    <div class="sub">OpenStreetMap base + supplier coordinates from API Gateway.</div>
    <div class="stat"><span class="pill" id="total">Loading…</span><span class="pill" id="shown">—</span></div>
    <div class="switchBar">
      <button class="switchBtn active">🗺️ Supplier Map</button>
      <button class="switchBtn" onclick="switchToDealer()">🏪 Dealer Map</button>
    </div>
    <div class="toolbar"><button class="btn" onclick="fitAll()">Fit all</button><button class="btn" onclick="reloadData()">Reload</button><button class="btn" id="videoShopBtn" onclick="openCurrentVideo()" style="background:#111827;color:#fff;border-color:#111827">🎬 Video tour</button></div>
    <div class="loading" id="status">Loading supplier coordinates…</div>
    <div class="list" id="list"></div>
  </div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, markersLayer, bounds, currentSupplier = null;
const statusEl = document.getElementById('status');
const listEl = document.getElementById('list');

function initMap(){
  map = L.map('map', { center:[34.0,108.0], zoom:4, zoomControl:true });
  // OpenStreetMap tiles: globally accessible (overseas friendly)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    subdomains: ['a','b','c'],
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}
function valid(s){ const lng=Number(s.longitude), lat=Number(s.latitude); return Number.isFinite(lng)&&Number.isFinite(lat)&&lng!==0&&lat!==0; }
function nameOf(s){ return s.shop_name || s.name || 'Unnamed supplier'; }
function addrOf(s){ return (s.company_info&&s.company_info.address) || s.address || ((s.business_items||[]).find(x=>x.address)||{}).address || ''; }
function bizOf(s){ return (s.company_info&&s.company_info.main_business) || (s.business_items||[]).map(x=>x.main_business).filter(Boolean).slice(0,2).join('; ') || ''; }
function esc(s){ return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function idOf(s){ return s._id || s.id || s.supplierId || ''; }
function videoUrl(s){ return '/supplier-videos?supplierId='+encodeURIComponent(idOf(s))+'&name='+encodeURIComponent(nameOf(s)); }
function setCurrentSupplier(s){ currentSupplier=s; const b=document.getElementById('videoShopBtn'); if(b) b.textContent='🎬 '+nameOf(s).slice(0,12); }
function openCurrentVideo(){ if(!currentSupplier){ alert('Click a supplier marker first, or wait for suppliers to load'); return; } window.top.location.href = videoUrl(currentSupplier); }
function switchToDealer(){
  if (window.top !== window) { window.top.location.href = '/map?type=dealer'; }
  else { window.location.href = '/dealer-map/?v=20260628'; }
}
function fitAll(){ if(bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.18)); }
async function reloadData(){
  try{
    statusEl.textContent = 'Loading supplier coordinates…';
    markersLayer.clearLayers(); listEl.innerHTML=''; bounds = L.latLngBounds([]);
    const r = await fetch('/api/mongo/supplier?limit=500&sort='+encodeURIComponent(JSON.stringify({updatedAt:-1})));
    const d = await r.json(); if(!r.ok) throw new Error(d.error||'load failed');
    const all = d.data || []; const suppliers = all.filter(valid);
    document.getElementById('total').textContent = `${all.length} suppliers`;
    document.getElementById('shown').textContent = `${suppliers.length} geocoded`;
    statusEl.textContent = suppliers.length ? 'Click a marker for details, or use 🎬 Video tour above' : 'No suppliers with coordinates';
    if(suppliers.length) setCurrentSupplier(suppliers[0]);
    suppliers.forEach((s,i)=>{
      const lat=Number(s.latitude), lng=Number(s.longitude), name=nameOf(s), addr=addrOf(s), biz=bizOf(s);
      const marker = L.marker([lat,lng], { title:name }).on('click',()=>setCurrentSupplier(s)).bindPopup(`<div class="shop">${esc(name)}</div><div class="addr">${esc(addr)||'No address'}</div><div class="biz">${esc(biz)}</div><div style="color:#999;margin-top:4px">${lng.toFixed(6)}, ${lat.toFixed(6)}</div><a class="videoBtn" target="_top" href="${videoUrl(s)}">🎬 Video tour</a>`);
      marker.addTo(markersLayer); bounds.extend([lat,lng]);
      const item = document.createElement('div'); item.className='item';
      item.innerHTML = `${i+1}. ${esc(name)}<br/><span style="color:#999">${esc(addr)||'No address'} · ${lng.toFixed(4)}, ${lat.toFixed(4)}</span><br/><a class="miniVideo" target="_top" href="${videoUrl(s)}" onclick="event.stopPropagation()">🎬 Video tour</a>`;
      item.onclick = () => { setCurrentSupplier(s); map.setView([lat,lng], 12); marker.openPopup(); };
      listEl.appendChild(item);
    });
    fitAll();
  }catch(e){ statusEl.innerHTML = '<span class="err">Load failed: '+esc(e.message)+'</span>'; }
}
initMap(); reloadData();
</script>
</body>
</html>
